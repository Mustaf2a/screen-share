<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشاركة شاشة الهاتف</title>
    <style>
        /* تصميم CSS بسيط وأنيق */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 400px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            margin-bottom: 20px;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        video {
            width: 100%;
            max-height: 400px;
            border-radius: 8px;
            background-color: #222;
            display: none; /* مخفي في البداية */
        }
    </style>
</head>
<body>

<div class="container">
    <h2>مشاركة الشاشة</h2>
    <p>اضغط على الزر أدناه لبدء مشاركة شاشتك:</p>
    
    <button id="startBtn">بدء مشاركة الشاشة</button>
    
    <video id="videoScreen" autoplay playsinline muted></video>
</div>

<script>
    // كود الجافا سكربت للتحكم بالمشاركة
    const startBtn = document.getElementById('startBtn');
    const videoScreen = document.getElementById('videoScreen');

    startBtn.addEventListener('click', async () => {
        try {
            // طلب إذن مشاركة الشاشة من المستخدم
            const mediaStream = await navigator.mediaDevices.getDisplayMedia({
                video: true,
                audio: true // يمكنك تحويلها لـ false إذا لم تكن بحاجة للصوت
            });

            // عرض البث داخل عنصر الفيديو
            videoScreen.srcObject = mediaStream;
            videoScreen.style.display = "block"; // إظهار الفيديو
            startBtn.disabled = true; // تعطيل الزر أثناء المشاركة

            // التعامل مع حالة إيقاف المشاركة من قبل المستخدم (من نظام الهاتف)
            mediaStream.getVideoTracks()[0].addEventListener('ended', () => {
                stopSharing();
            });

        } catch (error) {
            console.error("خطأ في مشاركة الشاشة: ", error);
            alert("تعذر مشاركة الشاشة. تأكد من إعطاء الصلاحيات، أو أن متصفحك يدعم هذه الميزة.");
        }
    });

    function stopSharing() {
        videoScreen.srcObject = null;
        videoScreen.style.display = "none";
        startBtn.disabled = false;
        alert("تم إيقاف مشاركة الشاشة.");
    }
</script>

</body>
</html>
